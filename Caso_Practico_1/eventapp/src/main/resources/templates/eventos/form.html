<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | EventApp'">Formulario | EventApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="mb-4">
        <h1 th:text="${titulo}">Nuevo evento</h1>
        <p class="text-muted">Complete la información del evento.</p>
    </div>

    <form th:action="@{${accion}}" th:object="${evento}" method="post" class="card shadow-sm">
        <div class="card-body">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" th:field="*{nombre}" class="form-control"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{nombre}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="3"
                          th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"></textarea>
                <div class="invalid-feedback" th:errors="*{descripcion}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" th:field="*{fecha}" class="form-control"
                       th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{fecha}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Lugar</label>
                <input type="text" th:field="*{lugar}" class="form-control"
                       th:classappend="${#fields.hasErrors('lugar')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{lugar}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <input type="text" th:field="*{categoria}" class="form-control"
                       th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{categoria}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Organizador</label>
                <input type="text" th:field="*{organizador}" class="form-control"
                       th:classappend="${#fields.hasErrors('organizador')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{organizador}"></div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cupo máximo</label>
                    <input type="number" th:field="*{cupoMaximo}" class="form-control"
                           th:classappend="${#fields.hasErrors('cupoMaximo')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{cupoMaximo}"></div>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Cupos vendidos</label>
                    <input type="number" th:field="*{cuposVendidos}" class="form-control"
                           th:classappend="${#fields.hasErrors('cuposVendidos')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{cuposVendidos}"></div>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Precio</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-control"
                           th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{precio}"></div>
                </div>
            </div>

        </div>

        <div class="card-footer d-flex justify-content-between">
            <a th:href="@{/eventos}" class="btn btn-outline-secondary">
                Cancelar
            </a>

            <button type="submit" class="btn btn-primary">
                Guardar evento
            </button>
        </div>
    </form>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
