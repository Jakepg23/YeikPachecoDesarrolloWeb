<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Producto | TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-header">
                    <h2 class="mb-0">Nuevo producto</h2>
                </div>

                <div class="card-body">

                    <form th:action="@{/productos}"
                          th:object="${producto}"
                          method="post">

                        <!-- Necesario para CREATE y UPDATE -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{nombre}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('nombre')}"
                                 th:errors="*{nombre}">
                            </div>
                        </div>

                        <!-- Descripcion -->
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>

                            <textarea class="form-control"
                                      rows="4"
                                      th:field="*{descripcion}">
                            </textarea>

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('descripcion')}"
                                 th:errors="*{descripcion}">
                            </div>
                        </div>

                        <!-- Precio -->
                        <div class="mb-3">
                            <label class="form-label">Precio</label>

                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   th:field="*{precio}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('precio')}"
                                 th:errors="*{precio}">
                            </div>
                        </div>

                        <!-- Stock -->
                        <div class="mb-3">
                            <label class="form-label">Stock</label>

                            <input type="number"
                                   class="form-control"
                                   th:field="*{stock}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('stock')}"
                                 th:errors="*{stock}">
                            </div>
                        </div>

                        <!-- Categoria -->
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{categoria}">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('categoria')}"
                                 th:errors="*{categoria}">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit"
                                    class="btn btn-primary">
                                Guardar producto
                            </button>

                            <a th:href="@{/productos}"
                               class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
