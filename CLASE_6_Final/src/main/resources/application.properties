spring.application.name=clase4base
server.port=8080

# Recargar plantillas Thymeleaf sin reiniciar (dev)
spring.thymeleaf.cache=false

# MySQL - variables de entorno con defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cursoswebdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:cambiame_local}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Upload de archivos (multipart)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Firebase Storage (opcional - completar al hacer el bonus)
# Bucket exacto se ve en Firebase Console > Storage > Files
firebase.bucket=

# Logs
logging.level.com.ufide.clase4base=DEBUG
