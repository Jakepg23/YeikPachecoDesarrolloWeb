<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${curso != null} ? ${curso.nombre} : 'No encontrado'">Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/cursos">Cursos</a></li>
            <li class="breadcrumb-item active"
                th:text="${curso != null} ? ${curso.nombre} : 'No encontrado'">Curso</li>
        </ol>
    </nav>

    <!-- Curso encontrado -->
    <div th:if="${curso != null}" class="card border-primary shadow">
        <img th:if="${curso.imagenUrl != null and !#strings.isEmpty(curso.imagenUrl)}"
             th:src="${curso.imagenUrl}"
             class="card-img-top"
             style="max-height: 300px; object-fit: cover;">

        <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="mb-0" th:text="${curso.nombre}">Nombre</h2>
                <span class="badge bg-light text-dark"
                      th:text="${curso.creditos} + ' creditos'">creditos</span>
            </div>
        </div>
        <div class="card-body">
            <p class="lead" th:text="${curso.descripcion}">Descripcion</p>

            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="border rounded p-3 text-center">
                        <i class="bi bi-person-circle text-primary" style="font-size:2rem;"></i>
                        <div class="small text-muted mt-2">Profesor</div>
                        <div class="h5 mb-0" th:text="${curso.profesor}">Profesor</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="border rounded p-3 text-center">
                        <i class="bi bi-hash text-primary" style="font-size:2rem;"></i>
                        <div class="small text-muted mt-2">ID</div>
                        <div class="h5 mb-0" th:text="${curso.id}">0</div>
                    </div>
                </div>
            </div>

            <hr class="my-4">
            <div class="d-flex gap-2">
                <a th:href="@{/cursos/{id}/editar(id=${curso.id})}" class="btn btn-warning">
                    <i class="bi bi-pencil me-1"></i>Editar
                </a>
                <a href="/cursos" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
            </div>
        </div>
    </div>

    <!-- No encontrado -->
    <div th:if="${curso == null}" class="alert alert-warning">
        <h4 class="alert-heading">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Curso no encontrado
        </h4>
        <p>No existe un curso con ese ID.</p>
        <hr>
        <a href="/cursos" class="btn btn-warning">Volver a la lista</a>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
