<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${curso.id == null} ? 'Nuevo curso' : 'Editar curso'">Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/cursos">Cursos</a></li>
            <li class="breadcrumb-item active"
                th:text="${curso.id == null} ? 'Nuevo' : 'Editar'">Nuevo</li>
        </ol>
    </nav>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">
                <i class="bi bi-mortarboard me-2"></i>
                <span th:text="${curso.id == null} ? 'Nuevo curso' : 'Editar curso'">Curso</span>
            </h2>
        </div>
        <div class="card-body">

            <!-- Alerta con resumen de errores -->
            <div class="alert alert-danger" th:if="${#fields.hasAnyErrors('curso.*')}">
                <strong><i class="bi bi-exclamation-triangle me-1"></i>Corregi estos errores:</strong>
                <ul class="mb-0 mt-2">
                    <li th:each="err : ${#fields.allErrors('curso.*')}" th:text="${err}"></li>
                </ul>
            </div>

            <form th:action="${curso.id == null} ? @{/cursos} : @{/cursos/{id}(id=${curso.id})}"
                  th:object="${curso}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{imagenUrl}">

                <div class="mb-3">
                    <label class="form-label">Nombre <span class="text-danger">*</span></label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                           th:field="*{nombre}">
                    <div class="invalid-feedback" th:errors="*{nombre}">Error</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripcion <span class="text-danger">*</span></label>
                    <textarea class="form-control" rows="3"
                              th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                              th:field="*{descripcion}"></textarea>
                    <div class="invalid-feedback" th:errors="*{descripcion}">Error</div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Creditos <span class="text-danger">*</span></label>
                        <input type="number" min="1" max="8" class="form-control"
                               th:classappend="${#fields.hasErrors('creditos')} ? 'is-invalid'"
                               th:field="*{creditos}">
                        <div class="invalid-feedback" th:errors="*{creditos}">Error</div>
                        <small class="text-muted">Entre 1 y 8</small>
                    </div>
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Profesor <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:classappend="${#fields.hasErrors('profesor')} ? 'is-invalid'"
                               th:field="*{profesor}">
                        <div class="invalid-feedback" th:errors="*{profesor}">Error</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Imagen (opcional - Firebase Storage)</label>
                    <input type="file" name="imagen" accept="image/*" class="form-control">
                    <img th:if="${curso.imagenUrl != null and !#strings.isEmpty(curso.imagenUrl)}"
                         th:src="${curso.imagenUrl}"
                         class="img-thumbnail mt-2"
                         style="max-height: 150px;">
                </div>

                <hr>
                <div class="d-flex gap-2">
                    <button class="btn btn-success">
                        <i class="bi bi-check-circle me-1"></i>Guardar
                    </button>
                    <a href="/cursos" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
