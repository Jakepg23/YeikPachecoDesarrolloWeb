spring.application.name=clase4base
server.port=8080

# Recargar plantillas Thymeleaf sin reiniciar (dev)
spring.thymeleaf.cache=false

# MySQL LOCAL - variables de entorno con defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cursoswebdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:cambiame_local}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CLASE 7 - PARTE F (AIVEN CLOUD)
# Para migrar a Aiven:
#   1) Comenta las 3 lineas de "MySQL LOCAL" de arriba.
#   2) Descomenta las 3 lineas de "MySQL AIVEN" de abajo.
#   3) Define DB_URL, DB_USERNAME y DB_PASSWORD con los valores del panel de Aiven.
#   4) Reinicia la app.
#
# Notas:
#   - ssl-mode=REQUIRED activa TLS (Aiven obliga a conexion cifrada).
#   - El driver es el mismo (mysql-connector-j) - no hay que cambiar dependencias.
#
# spring.datasource.url=${DB_URL:jdbc:mysql://tu-host.aivencloud.com:12345/defaultdb?ssl-mode=REQUIRED}
# spring.datasource.username=${DB_USERNAME:avnadmin}
# spring.datasource.password=${DB_PASSWORD:cambiar_por_aiven}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Upload de archivos (multipart)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Firebase Storage (opcional - completar al hacer el bonus)
# Bucket exacto se ve en Firebase Console > Storage > Files
firebase.bucket=

# Logs
logging.level.com.ufide.clase4base=DEBUG
