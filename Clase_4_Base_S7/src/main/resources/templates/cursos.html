<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos | SC-403</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Cursos disponibles</h1>
            <p class="text-muted">
                Total: <span class="badge bg-primary" th:text="${cursos.size()}">0</span>
            </p>
        </div>
        <a href="/cursos/nuevo" class="btn btn-success">
            <i class="bi bi-plus-circle me-1"></i>Nuevo curso
        </a>
    </div>

    <!-- Grid responsive con cards -->
    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4"
             th:each="c, iter : ${cursos}">

            <div class="card h-100 shadow-sm card-hover">
                <!-- Imagen si existe -->
                <img th:if="${c.imagenUrl != null and !#strings.isEmpty(c.imagenUrl)}"
                     th:src="${c.imagenUrl}"
                     class="card-img-top"
                     style="height: 200px; object-fit: cover;">

                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="badge bg-secondary"
                              th:text="'#' + ${iter.count}">#1</span>
                        <span class="badge bg-info text-dark"
                              th:text="${c.creditos} + ' creditos'">creditos</span>
                    </div>

                    <h5 class="card-title brand-accent" th:text="${c.nombre}">Nombre</h5>

                    <p class="text-muted small flex-grow-1"
                       th:text="${c.descripcion}">Descripcion</p>

                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <small class="text-muted">
                            <i class="bi bi-person-circle me-1"></i>
                            <span th:text="${c.profesor}">Profesor</span>
                        </small>
                    </div>

                    <!-- Botones de accion -->
                    <div class="btn-group btn-group-sm mt-3" role="group">
                        <a class="btn btn-outline-primary"
                           th:href="@{/cursos/{id}(id=${c.id})}"
                           title="Ver detalle">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a class="btn btn-outline-warning"
                           th:href="@{/cursos/{id}/editar(id=${c.id})}"
                           title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button type="button" class="btn btn-outline-danger"
                                data-bs-toggle="modal"
                                data-bs-target="#modalEliminar"
                                th:data-id="${c.id}"
                                th:data-nombre="${c.nombre}"
                                title="Eliminar">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensaje cuando no hay cursos -->
    <div class="alert alert-warning mt-4" th:if="${cursos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay cursos para mostrar.
        <a href="/cursos/nuevo" class="alert-link">Crear el primero</a>
    </div>

</main>

<!-- ============================================ -->
<!-- MODAL DE CONFIRMACION DE DELETE -->
<!-- ============================================ -->
<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog">
        <form id="formEliminar" method="post">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle text-danger me-2"></i>
                        Confirmar eliminacion
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Seguro que queres eliminar el curso
                    <strong id="nombreModal"></strong>?
                    <br>
                    <small class="text-muted">Esta accion no se puede deshacer.</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Si, eliminar
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- ============================================ -->
<!-- TOAST DE FEEDBACK -->
<!-- ============================================ -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
    <div id="toastOk" class="toast align-items-center text-white bg-success border-0"
         th:if="${ok}">
        <div class="d-flex">
            <div class="toast-body">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${ok}">Mensaje</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
    <div id="toastError" class="toast align-items-center text-white bg-danger border-0"
         th:if="${error}">
        <div class="d-flex">
            <div class="toast-body">
                <i class="bi bi-x-circle me-2"></i>
                <span th:text="${error}">Mensaje</span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript del modal -->
<script>
document.getElementById('modalEliminar').addEventListener('show.bs.modal', event => {
    const btn = event.relatedTarget;
    const id = btn.getAttribute('data-id');
    const nombre = btn.getAttribute('data-nombre');
    document.getElementById('formEliminar').action = '/cursos/' + id + '/eliminar';
    document.getElementById('nombreModal').textContent = nombre;
});

// Auto-mostrar los toasts si hay mensajes flash
window.addEventListener('load', () => {
    const ok = document.getElementById('toastOk');
    if (ok) new bootstrap.Toast(ok, {delay: 3500}).show();
    const err = document.getElementById('toastError');
    if (err) new bootstrap.Toast(err, {delay: 4500}).show();
});
</script>

</body>
</html>
